# Deploy Companio on a VPS with a self-hosted GitHub Actions runner.
#
# Setup:
# - Register the runner on this repo (Settings → Actions → Runners).
# - Put runtime secrets in a server-side `.env` (not in git), e.g. next to the app or via systemd EnvironmentFile.
# - Run the bot under systemd/pm2 with WorkingDirectory pointing at the same directory you deploy to.
#
# Variables (DEPLOY_TARGET_DIR, SYSTEMD_*, etc.):
# - Either: Repository variables — Settings → Secrets and variables → Actions → Variables (repository).
# - Or: Environment variables — Settings → Environments → production (or your env name). Those are only
#   visible to jobs that declare `environment:` below. Change `production` to match your environment name.
#
# Optional Variables:
# - DEPLOY_TARGET_DIR — e.g. /home/seed/companio. Rsyncs the repo there (excludes .git, node_modules, .env,
#   companio.db*), then install/typecheck in that directory.
# - SYSTEMD_SCOPE — `system` (default) or `user` (no sudo; use user unit + loginctl enable-linger).
# - SYSTEMD_UNIT — default companio.
#
# Optional Secrets (repository or same Environment):
# - DEPLOY_COMMAND — overrides systemctl restart (e.g. pm2 restart companio).
#
# Restart: CI has no TTY — use SYSTEMD_SCOPE=user, or NOPASSWD sudo for systemctl, or DEPLOY_COMMAND.

name: Deploy

on:
    push:
        branches:
            - main
    workflow_dispatch:

concurrency:
    group: deploy-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: self-hosted
        environment: production

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Sync to production directory (optional)
              env:
                  DEPLOY_TARGET_DIR: ${{ vars.DEPLOY_TARGET_DIR }}
              run: |
                  set -euo pipefail
                  if [ -z "${DEPLOY_TARGET_DIR}" ]; then
                    echo "DEPLOY_TARGET_DIR not set; using workspace as app root."
                    exit 0
                  fi
                  mkdir -p "${DEPLOY_TARGET_DIR}"
                  rsync -a --delete \
                    --exclude=.git \
                    --exclude=node_modules \
                    --exclude=.env \
                    --exclude=companio.db \
                    --exclude='companio.db-*' \
                    "${GITHUB_WORKSPACE}/" "${DEPLOY_TARGET_DIR}/"
                  echo "Synced to ${DEPLOY_TARGET_DIR}"

            - name: Install dependencies and typecheck
              env:
                  DEPLOY_TARGET_DIR: ${{ vars.DEPLOY_TARGET_DIR }}
              run: |
                  set -euo pipefail
                  if [ -n "${DEPLOY_TARGET_DIR}" ]; then
                    cd "${DEPLOY_TARGET_DIR}"
                  fi
                  bun install --frozen-lockfile
                  bunx tsc --noEmit

            - name: Restart application
              env:
                  DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}
                  SYSTEMD_UNIT: ${{ vars.SYSTEMD_UNIT }}
                  SYSTEMD_SCOPE: ${{ vars.SYSTEMD_SCOPE }}
              run: |
                  set -euo pipefail
                  UNIT="${SYSTEMD_UNIT:-companio}"
                  SCOPE="${SYSTEMD_SCOPE:-system}"

                  if [ -n "${DEPLOY_COMMAND:-}" ]; then
                    echo "Running custom DEPLOY_COMMAND from secrets..."
                    eval "$DEPLOY_COMMAND"
                    exit 0
                  fi

                  if [ "${SCOPE}" = "user" ]; then
                    echo "Restarting user systemd unit: ${UNIT}"
                    systemctl --user restart "${UNIT}"
                    exit 0
                  fi

                  echo "Restarting system systemd unit: ${UNIT} (non-interactive sudo -n)"
                  if sudo -n systemctl restart "${UNIT}"; then
                    exit 0
                  fi
                  echo "::error::sudo -n systemctl restart failed (no password prompt in CI)."
                  echo "Fix: set variable SYSTEMD_SCOPE=user, or NOPASSWD for this runner user, or secret DEPLOY_COMMAND."
                  exit 1
